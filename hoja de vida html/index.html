<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfiles Profesionales</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
 rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
}

h1{
    margin-bottom:50px;
    font-size:38px;
    color:#00c6ff;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    width:90%;
    max-width:1100px;
}

.card{
    background:#1c1c1c;
    padding:30px 20px;
    border-radius:15px;
    text-align:center;
    transition:0.4s;
    border:1px solid #333;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
    transform:translateY(-10px);
    border-color:#00c6ff;
}

.card img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00c6ff;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:10px;
    font-size:22px;
}

.card p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:20px;
}

.card a{
    display:inline-block;
    padding:10px 18px;
    background:#00c6ff;
    color:black;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
    transition:0.3s;
}

.card a:hover{
    background:#0072ff;
    color:white;
}

footer{
    margin-top:60px;
    font-size:14px;
    opacity:0.6;
}

</style>
</head>
<body>

<h1>hojas de vida</h1>

<div class="container">

    <!-- Elmer -->
    <div class="card">
        <img src="img.jpg" alt="Elmer Oviedo">
        <h2>Elmer Oviedo</h2>
        <p>Ingeniería de Software</p>
        <a href="elmer.html">Ver Perfil</a>
    </div>

    <!-- Juan -->
    <div class="card">
        <img src="juan.jpeg" alt="Juan Garcia">
        <h2>Juan Garcia</h2>
        <p>Ingeniería de Software</p>
        <a href="juan.html">Ver Perfil</a>
    </div>

    <!-- Eduardo -->
    <div class="card">
        <img src="alvis.jpeg" alt="Eduardo Alvis">
        <h2>Eduardo Alvis</h2>
        <p>Ingeniería de Software</p>
        <a href="eduardo.html">Ver Perfil</a>
    </div>

    <!-- Nestor -->
    <div class="card">
        <img src="nestor.jpeg" alt="Nestor Rodriguez">
        <h2>Nestor Rodriguez</h2>
        <p>Ingeniería de Software</p>
        <a href="nestor.html">Ver Perfil</a>
    </div>

    <!-- Eder -->
    <div class="card">
        <img src="eder.jpeg" alt="Eder Tamara">
        <h2>Eder Tamara</h2>
        <p>Ingeniería de Software</p>
        <a href="eder.html">Ver Perfil</a>
    </div>
</div>

<footer>
© 2026 - Hojas de vida
</footer>

</body>
</html>
